services:
  postgres:
    container_name: postgresql
    image: postgres:16
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=postgres

  redis:
    image: redis:8.4.0
    container_name: redis
    ports:
      - 6379:6379
