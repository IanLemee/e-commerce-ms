services:
  app:
    container_name: stock-service
    image: ianlemee/stock-ms:latest
    build:
      context: ../
      dockerfile: stock/Dockerfile
    ports:
      - 8080:8080

  postgres:
    container_name: postgresql
    image: postgres:16
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=postgres

  redis:
    image: redis:8.4.0
    container_name: redis
    ports:
      - 6379:6379
