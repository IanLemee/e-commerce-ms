name: CI/CD Pipeline User-MS

on:
  push:
    branches:
      - main
      - develop

jobs:
  build_and_deploy:

    strategy:
      matrix:
        include:
          - java-version: '17'
          - distribution: 'temurin'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          distribution: ${{matrix.distribution}}
          java-version: ${{matrix.java-version}}
          cache: maven
          cache-dependency-path: 'user/pom.xml'
        run: mvn -B package --file pom.xml
