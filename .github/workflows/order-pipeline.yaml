name: CI/CD Pipeline Order-MS

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'order/**'
      - 'pom.xml'

#  pull_request:
#    branches: [ "develop" ]
#    paths:
#      - 'order/**'
#      - 'pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build App
        run: mvn clean package -pl order -am

      - name: Login in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order/Dockerfile
          push: 'true'
          tags: ${{secrets.DOCKER_USERNAME}}/order-ms:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_ORDER }}
          username: ${{ secrets.EC2_USER_ORDER }}
          key: ${{ secrets.EC2_SSH_KEY_ORDER }}
          target: order/docker-compose.yaml
          source: "/tmp"
          strip_components: '1'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Run app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_ORDER }}
          username: ${{ secrets.EC2_USER_ORDER }}
          key: ${{ secrets.EC2_SSH_KEY_ORDER }}
          script: |
            mkdir -p /home/ec2-user/app-order
            
            mv /tmp/docker-compose.yaml /home/ec2-user/app-order
            
            cd /home/ec2-user/app-order
            
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f