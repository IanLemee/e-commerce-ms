name: CI/CD Pipeline S3-failed-event-consumer-ms

on:
  push:
    branches: ['develop']
    paths:
      - 'pom.xml'
      - 's3-failed-event-consumer/**'
      - '.github/workflows/s3-failed-event-consumer.yaml.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build App
        run: mvn clean package -pl s3-failed-event-consumer -am

      - name: Login in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: s3-failed-event-consumer/Dockerfile
          push: 'true'
          tags: ${{secrets.DOCKER_USERNAME}}/s3-failed-event-consumer-ms:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Run App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/app-s3-failed-event-consumer-ms
            cd /home/ec2-user/app-s3-failed-event-consumer-ms
            
            IMAGE_NAME="s3-failed-event-consumer-ms:latest"
            CONTAINER_NAME="app-s3-failed"
            
            echo "Starting app"
            docker pull $IMAGE_NAME
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker -d run --name $CONTAINER_NAME -p 8080:8080 $IMAGE_NAME
            docker image prune -f
            echo "App started"
            exit 0

