name: CI/CD Pipeline Notification-MS

on:
  push:
    branches:
      - "develop"
    paths:
      - 'pom.xml'
      - 'notification/**'
      - './.github/workflows/notification-pipeline.yaml'

#  pull_request:
#    branches:
#      - "develop"
#    paths:
#      - "notification/**"
#      - "pom.xml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: setup jdk 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build app
        run: mvn clean package -pl notification -am

      - name: Login in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification/Dockerfile
          push: 'true'
          tags: ${{secrets.DOCKER_USERNAME}}/notification-ms:latest

      - name: Copy compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_STOCK }}
          username: ${{ secrets.EC2_USER_STOCK }}
          key: ${{ secrets.EC2_SSH_KEY_STOCK }}
          source: notification/docker-compose.yaml
          target: "/tmp"
          strip_components: '1'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Connect in to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STOCK }}
          username: ${{ secrets.EC2_USER_STOCK }}
          key: ${{ secrets.EC2_SSH_KEY_STOCK }}
          script: |
            mkdir -p /home/ec2-user/app-notification
            
            mv /tmp/docker-compose.yaml /home/ec2-user/app-notification
            
            cd /home/ec2-user/app-notification
            
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f 
            
