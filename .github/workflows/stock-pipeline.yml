name: CI/CD Pipeline Stock-MS

on:
  push:
    branches:
      - 'develop'
    paths:
      - 'pom.xml'
      - 'stock/**'
      - '.github/workflows/stock-pipeline.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Build App
        run: mvn clean package -pl stock -am

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: stock/Dockerfile
          push: 'true'
          tags: ${{secrets.DOCKER_USERNAME}}/stock-ms:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_STOCK }}
          username: ${{ secrets.EC2_USER_STOCK }}
          key: ${{ secrets.EC2_SSH_KEY_STOCK }}
          source: stock/docker-compose.yaml
          target: "/tmp"
          strip_components: '1'

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Create folder if does not exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_STOCK }}
          username: ${{ secrets.EC2_USER_STOCK }}
          key: ${{ secrets.EC2_SSH_KEY_STOCK }}
          script: |
            mkdir -p /home/ec2-user/app-stock
            
            mv /tmp/docker-compose.yaml /home/ec2-user/app-stock/docker-compose.yaml
            
            cd /home/ec2-user/app-stock
            
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f