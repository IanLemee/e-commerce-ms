name: CI/CD Pipeline User-MS

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'user/**'
      - 'pom.xml'
      - '.github/workflows/user-pipeline.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with maven
        run: mvn clean package -pl user -am -DskipTests=false

      - name: Copy docker compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "user/docker-compose.yaml"
          target: "/home/ec2-user/app-user"
          strip_components: '1'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Deploy and Start on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app-user
            
            echo "Starting app"
            docker-compose down || true
            docker-compose up -d
            
            echo "App started"
            exit 0