name: docker actions
description: Login in to Docker hub Build and Push the image
runs:
  using: composite
  steps:
    - name: Login in to Docker hub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}

    - name: Build and push to Docker hub repository
      uses: docker/build-push-action@v5
      with:
        context: .
        file: user/Dockerfile
        push: 'true'
        tags: ${{secrets.DOCKER_USERNAME}}/user-ms:latest